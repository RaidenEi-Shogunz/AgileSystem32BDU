<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>Sản phẩm | Gundam Store</title>

<link rel="stylesheet" href="/css/style.css" />

<style>
body{background:#f6f7fb}
.page{max-width:1200px;margin:0 auto;padding:16px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:12px 0}
.title{margin:0;font-size:26px}
.sub{margin:6px 0 0;color:#6b7280;font-size:13px}
.count{color:#6b7280;font-size:13px}

.toolbar{
position:sticky;top:0;z-index:20;
background:rgba(255,255,255,.92);
backdrop-filter:saturate(1.3) blur(10px);
border:1px solid #eee;border-radius:14px;padding:12px;
box-shadow:0 10px 26px rgba(0,0,0,.06);
margin:12px 0 16px;
}

.grid{
display:grid;
grid-template-columns: 1.2fr .9fr .9fr .9fr;
gap:10px;
}

@media(max-width:860px){
.grid{grid-template-columns:1fr 1fr}
}

.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.label{font-size:12px;color:#6b7280}

.input,.select{
width:100%;
padding:10px 12px;
border-radius:10px;
border:1px solid #e5e7eb;
background:#fff;
font-size:14px;
}

.list{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:14px;
}

.product-card{
border-radius:14px;
border:1px solid #eee;
background:#fff;
overflow:hidden;
box-shadow:0 10px 26px rgba(0,0,0,.06);
cursor:pointer;
}

.product-image-container img{
width:100%;
height:175px;
object-fit:cover;
}

.info{padding:12px}

.name{
margin:0 0 10px;
font-size:14px;
line-height:1.25;
min-height:36px
}

/* PHẦN BỔ SUNG */
.short-desc{
margin:0 0 10px;
font-size:12px;
color:#6b7280;
line-height:1.3;
height:32px;
overflow:hidden;
}

.meta{
display:flex;
align-items:center;
justify-content:space-between;
}

.price{
font-weight:1000;
display:flex;
gap:8px;
}

.price .old{
color:#9ca3af;
text-decoration:line-through;
font-size:12px
}

.sold{
color:#6b7280;
font-size:12px
}

</style>
</head>

<body>

<header id="topbar-container"></header>

<main class="page">

<div class="head">
<div>
<h1 class="title">Danh sách sản phẩm</h1>
<p class="sub">Lọc nhanh theo danh mục/grade</p>
</div>
<div class="count" id="resultCount"></div>
</div>

<section class="toolbar">
<div class="grid">

<div class="field">
<div class="label">Tìm theo tên</div>
<input class="input" id="q">
</div>

<div class="field">
<div class="label">Danh mục</div>
<select id="category-filter" class="select">
<option value="all">Tất cả</option>
<option value="Gundam">Gundam</option>
<option value="Figure">Figure</option>
</select>
</div>

<div class="field">
<div class="label">Grade</div>
<select id="grade-filter" class="select">
<option value="">Tất cả</option>
<option value="HG">HG</option>
<option value="RG">RG</option>
<option value="MG">MG</option>
<option value="PG">PG</option>
</select>
</div>

<div class="field">
<div class="label">Sắp xếp</div>
<select id="sort" class="select">
<option value="new">Mới</option>
<option value="hot">Bán chạy</option>
<option value="price_asc">Giá tăng</option>
<option value="price_desc">Giá giảm</option>
</select>
</div>

</div>
</section>

<section>
<div class="list" id="product-list"></div>
</section>

</main>

<script>

const db = firebase.firestore()

let ALL=[]

function escapeHtml(s){
return (s??"").replace(/[&<>"']/g,function(c){
return{
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#039;"
}[c]
})
}

function formatVND(n){
return Number(n).toLocaleString("vi-VN")+"₫"
}

function finalPrice(price,discount){
return Math.round(price*(1-discount/100))
}

function cardHtml(p){

const id=String(p.id)

const name=escapeHtml(p.name||"")

const img=escapeHtml(p.image||"")

const price=Number(p.price||0)

const discount=Number(p.discount||0)

const sold=Number(p.sold||0)

/* PHẦN BỔ SUNG */
const desc = escapeHtml(
p.shortDesc ||
(p.description ? p.description.substring(0,60)+"..." : "")
)

const fp=finalPrice(price,discount)

const priceHtml=
discount>0
?`<span class="final">${formatVND(fp)}</span>
<span class="old">${formatVND(price)}</span>`
:`<span class="final">${formatVND(fp)}</span>`

return`

<div class="product-card" onclick="location.href='/detail.html?id=${id}'">

<div class="product-image-container">
<img src="${img}">
</div>

<div class="info">

<h3 class="name">${name}</h3>

<p class="short-desc">${desc}</p>

<div class="meta">

<span class="price">
${priceHtml}
</span>

<span class="sold">
${sold} đã bán
</span>

</div>

</div>

</div>

`
}

async function load(){

const snap=await db.collection("products").get()

ALL=snap.docs.map(d=>({
...d.data(),
id:d.id
}))

render(ALL)

}

function render(list){

document.getElementById("resultCount").innerText=
list.length+" sản phẩm"

document.getElementById("product-list").innerHTML=
list.map(cardHtml).join("")

}

load()

</script>

</body>
</html>
