<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Sản phẩm | Gundam Store</title>

  <link rel="stylesheet" href="/css/style.css" />

  <!-- Page-only CSS (an toàn, không phá style.css) -->
  <style>
    body{background:#f6f7fb}
    .page{max-width:1200px;margin:0 auto;padding:16px}
    .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:12px 0}
    .title{margin:0;font-size:26px}
    .sub{margin:6px 0 0;color:#6b7280;font-size:13px}
    .count{color:#6b7280;font-size:13px}

    .toolbar{
      position:sticky;top:0;z-index:20;
      background:rgba(255,255,255,.92);
      backdrop-filter:saturate(1.3) blur(10px);
      border:1px solid #eee;border-radius:14px;padding:12px;
      box-shadow:0 10px 26px rgba(0,0,0,.06);
      margin:12px 0 16px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1.2fr .9fr .9fr .9fr;
      gap:10px;
    }
    @media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}
    .field{display:flex;flex-direction:column;gap:6px;min-width:0}
    .label{font-size:12px;color:#6b7280;display:flex;align-items:center;gap:6px}
    .input,.select{
      width:100%;padding:10px 12px;border-radius:10px;border:1px solid #e5e7eb;
      outline:none;background:#fff;font-size:14px;
    }
    .input:focus,.select:focus{border-color:#b9c7ff;box-shadow:0 0 0 4px rgba(99,102,241,.12)}

    .list{
      display:grid;grid-template-columns:repeat(5,minmax(0,1fr));
      gap:14px;
    }
    @media(max-width:1100px){.list{grid-template-columns:repeat(4,minmax(0,1fr))}}
    @media(max-width:860px){.list{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:420px){.list{grid-template-columns:1fr}}

    .product-card{
      border-radius:14px;border:1px solid #eee;background:#fff;overflow:hidden;
      box-shadow:0 10px 26px rgba(0,0,0,.06);
      transition:.18s ease;cursor:pointer;display:flex;flex-direction:column;
    }
    .product-card:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(0,0,0,.10)}
    .product-image-container{position:relative}
    .product-image-container img{width:100%;height:175px;object-fit:cover;display:block}

    .discount-badge{
      position:absolute;top:10px;left:10px;
      background:#ef4444;color:#fff;font-weight:900;font-size:12px;
      padding:6px 8px;border-radius:999px;
      box-shadow:0 10px 22px rgba(239,68,68,.25);
    }
    .quickview-btn{
      position:absolute;top:10px;right:10px;
      border:none;border-radius:10px;background:rgba(255,255,255,.92);
      width:38px;height:38px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;box-shadow:0 10px 22px rgba(0,0,0,.12);
    }

    .info{padding:12px}
    .name{margin:0 0 10px;font-size:14px;line-height:1.25;min-height:36px}
    .meta{display:flex;align-items:center;justify-content:space-between;gap:10px}

    /* ✅ PRICE: chuẩn TMĐT (giá mới nổi, giá cũ gạch) */
    .price{font-weight:1000;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .price .final{font-weight:1000}
    .price .old{color:#9ca3af;text-decoration:line-through;font-weight:900;font-size:12px}

    .sold{color:#6b7280;font-weight:800;font-size:12px}

    .empty{
      border:1px solid #eee;border-radius:14px;background:#fff;
      padding:18px;text-align:center;color:#6b7280;
      box-shadow:0 10px 26px rgba(0,0,0,.06);
    }

    .skeleton-card{border-radius:14px;border:1px solid #eee;background:#fff;overflow:hidden}
    .sk-img{height:175px;background:linear-gradient(90deg,#f2f2f2,#f8f8f8,#f2f2f2);background-size:200% 100%;animation:sk 1.1s infinite}
    .sk-ln{height:12px;margin:10px 12px;border-radius:999px;background:linear-gradient(90deg,#f2f2f2,#f8f8f8,#f2f2f2);background-size:200% 100%;animation:sk 1.1s infinite}
    .sk-ln.sm{width:55%}.sk-ln.md{width:80%}.sk-ln.lg{width:92%}
    @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

    .pager{display:flex;justify-content:center;align-items:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap}
    .pager button{padding:10px 12px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-weight:900}
    .pager button:disabled{opacity:.55;cursor:not-allowed}
    .pager .info{color:#6b7280;font-size:13px}
  </style>
</head>

<body>
  <!-- Đồng bộ header/topbar -->
  <header id="topbar-container"></header>

  <main class="page">
    <div class="head">
      <div>
        <h1 class="title">Danh sách sản phẩm</h1>
        <p class="sub">Lọc nhanh theo danh mục/grade — sắp xếp theo giá, mới nhất, bán chạy.</p>
      </div>
      <div class="count" id="resultCount">Đang tải...</div>
    </div>

    <section class="toolbar" aria-label="Bộ lọc sản phẩm">
      <div class="grid">
        <div class="field">
          <div class="label">🔎 Tìm theo tên</div>
          <input class="input" id="q" type="search" placeholder="VD: Unicorn, Barbatos, RX-78..." autocomplete="off" />
        </div>

        <div class="field">
          <div class="label">📦 Danh mục</div>
          <select class="select" id="category-filter">
            <option value="all">Tất cả</option>
            <option value="Gundam">Mô hình Gundam</option>
            <option value="30ML">30ML - 30 Minutes Labels</option>
            <option value="Kotobukiya">Kotobukiya</option>
            <option value="Mecha">Mecha khác</option>
            <option value="Figure">Figure</option>
            <option value="Nendoroid">Nendoroid</option>
            <option value="Tool">Dụng cụ & Sơn</option>
          </select>
        </div>

        <div class="field">
          <div class="label">🧩 Grade</div>
          <select class="select" id="grade-filter">
            <option value="">Tất cả</option>
            <option value="HG">HG</option>
            <option value="RG">RG</option>
            <option value="MG">MG</option>
            <option value="PG">PG</option>
            <option value="SD">SD</option>
          </select>
        </div>

        <div class="field">
          <div class="label">↕️ Sắp xếp</div>
          <select class="select" id="sort">
            <option value="new">Mới nhất</option>
            <option value="hot">Bán chạy</option>
            <option value="price_asc">Giá tăng dần</option>
            <option value="price_desc">Giá giảm dần</option>
            <option value="name_asc">Tên A → Z</option>
            <option value="name_desc">Tên Z → A</option>
          </select>
        </div>
      </div>
    </section>

    <section aria-label="Danh sách">
      <div class="list" id="product-list">
        <div class="skeleton-card"><div class="sk-img"></div><div class="sk-ln lg"></div><div class="sk-ln sm"></div></div>
        <div class="skeleton-card"><div class="sk-img"></div><div class="sk-ln md"></div><div class="sk-ln sm"></div></div>
        <div class="skeleton-card"><div class="sk-img"></div><div class="sk-ln lg"></div><div class="sk-ln sm"></div></div>
        <div class="skeleton-card"><div class="sk-img"></div><div class="sk-ln md"></div><div class="sk-ln sm"></div></div>
        <div class="skeleton-card"><div class="sk-img"></div><div class="sk-ln lg"></div><div class="sk-ln sm"></div></div>
      </div>

      <div class="empty" id="emptyState" hidden>
        <b>Không tìm thấy sản phẩm phù hợp.</b><br/>
        Thử đổi bộ lọc hoặc từ khoá tìm kiếm.
      </div>

      <div class="pager" id="pager" hidden>
        <button type="button" id="prevPage">← Trước</button>
        <div class="info" id="pagerInfo">Trang 1/1</div>
        <button type="button" id="nextPage">Sau →</button>
      </div>
    </section>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore-compat.js" defer></script>
  <script src="/js/firebase-init.js" defer></script>
  <script src="/js/topbar.js" defer></script>
  <script src="/js/redirect.js" defer></script>

  <script>
    (function(){
      "use strict";

      const db = (window.db) || (window.firebase && window.firebase.firestore && window.firebase.firestore());
      const PAGE_SIZE = 20;

      const $ = (s, r=document) => r.querySelector(s);

      const elList = $("#product-list");
      const elEmpty = $("#emptyState");
      const elCount = $("#resultCount");
      const elPager = $("#pager");
      const elPrev = $("#prevPage");
      const elNext = $("#nextPage");
      const elPagerInfo = $("#pagerInfo");

      const elQ = $("#q");
      const elCategory = $("#category-filter");
      const elGrade = $("#grade-filter");
      const elSort = $("#sort");

      let ALL = [];
      let VIEW = [];
      let page = 1;

      function escapeHtml(s){
        return (s ?? "").toString().replace(/[&<>"']/g, c => ({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[c]));
      }

      function formatVND(n){
        const num = Number(n||0);
        try { return num.toLocaleString("vi-VN") + "₫"; }
        catch { return String(num) + "₫"; }
      }

      function clampDiscount(d){
        const x = Number(d || 0);
        if(!Number.isFinite(x)) return 0;
        return Math.max(0, Math.min(99, x));
      }

      function finalPrice(price, discount){
        const p = Number(price || 0);
        const d = clampDiscount(discount);
        if(!d) return p;
        return Math.round(p * (1 - d/100));
      }

      function toDateValue(x){
        if(!x) return 0;
        if(typeof x === "number") return x;
        if(typeof x === "string"){
          const t = Date.parse(x);
          return Number.isFinite(t) ? t : 0;
        }
        if(x instanceof Date) return x.getTime();
        if(typeof x.toMillis === "function") return x.toMillis();
        if(typeof x.seconds === "number") return x.seconds*1000;
        return 0;
      }

      function debounce(fn, ms=220){
        let t=null;
        return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); };
      }

      function getParams(){
        const u=new URL(location.href);
        return {
          category: u.searchParams.get("category") || "all",
          grade: u.searchParams.get("grade") || "",
          q: u.searchParams.get("q") || "",
          sort: u.searchParams.get("sort") || "new",
          page: Math.max(1, Number(u.searchParams.get("page")||1))
        };
      }

      function setParams(next){
        const u=new URL(location.href);
        Object.entries(next).forEach(([k,v])=>{
          if(v==="" || v==null || (k==="category" && v==="all") || (k==="page" && Number(v)===1)){
            u.searchParams.delete(k);
          }else{
            u.searchParams.set(k,String(v));
          }
        });
        history.replaceState(null,"",u.toString());
      }

      function safeRedirect(id){
        const pid = String(id);
        if(typeof window.redirect==="function") return window.redirect(pid);
        // ✅ FIX: đúng trang detail của bạn
        window.location.href = `/detail.html?id=${encodeURIComponent(pid)}`;
      }
      window.safeRedirect = safeRedirect;

      function matchCategory(p, cat){
        if(!cat || cat==="all") return true;
        return String(p.category||"")===cat || String(p.category1||"")===cat || String(p.category2||"")===cat;
      }
      function matchGrade(p, g){
        if(!g) return true;
        return String(p.grade||"").toUpperCase()===String(g).toUpperCase();
      }
      function matchSearch(p, q){
        if(!q) return true;
        const s=q.trim().toLowerCase();
        if(!s) return true;
        const name=String(p.name||"").toLowerCase();
        const brand=String(p.brand||"").toLowerCase();
        return name.includes(s) || brand.includes(s);
      }

      // ✅ Sort theo GIÁ SAU GIẢM (finalPrice), chuẩn TMĐT
      function sortList(list, key){
        const k=key||"new";
        list.sort((a,b)=>{
          if(k==="hot") return Number(b.sold||0)-Number(a.sold||0);

          if(k==="price_asc"){
            return finalPrice(a.price, a.discount) - finalPrice(b.price, b.discount);
          }
          if(k==="price_desc"){
            return finalPrice(b.price, b.discount) - finalPrice(a.price, a.discount);
          }

          if(k==="name_asc") return String(a.name||"").localeCompare(String(b.name||""),"vi");
          if(k==="name_desc") return String(b.name||"").localeCompare(String(a.name||""),"vi");

          return toDateValue(b.releaseDate||b.createdAt)-toDateValue(a.releaseDate||a.createdAt);
        });
      }

      // ✅ Card: hiện giá sau giảm + giá cũ gạch (nếu có discount)
      function cardHtml(p){
        const id = String(p.id);
        const name = escapeHtml(p.name||"Sản phẩm");
        const img = escapeHtml(p.image||"/images/placeholder.png");
        const price = Number(p.price||0);
        const discount = clampDiscount(p.discount);
        const sold = Number(p.sold||0);

        const fp = finalPrice(price, discount);

        const priceHtml = discount>0
          ? `<span class="final">${formatVND(fp)}</span><span class="old">${formatVND(price)}</span>`
          : `<span class="final">${formatVND(fp)}</span>`;

        return `
          <div class="product-card" role="button" tabindex="0" data-id="${escapeHtml(id)}">
            <div class="product-image-container">
              <img src="${img}" alt="${name}" loading="lazy" decoding="async">
              ${discount>0 ? `<span class="discount-badge">-${discount}%</span>` : ""}
              <button class="quickview-btn" type="button" data-quick="1" aria-label="Xem nhanh">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <div class="info">
              <h3 class="name" title="${name}">${name}</h3>
              <div class="meta">
                <span class="price">${priceHtml}</span>
                <span class="sold"><i class="fa-solid fa-bag-shopping"></i> ${sold}</span>
              </div>
            </div>
          </div>
        `;
      }

      function render(){
        const total = VIEW.length;
        const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
        page = Math.min(Math.max(1,page), totalPages);

        const start = (page-1)*PAGE_SIZE;
        const items = VIEW.slice(start, start+PAGE_SIZE);

        elCount.textContent = `${total.toLocaleString("vi-VN")} sản phẩm`;

        if(!items.length){
          elList.innerHTML = "";
          elEmpty.hidden = false;
          elPager.hidden = true;
          return;
        }

        elEmpty.hidden = true;
        elList.innerHTML = items.map(cardHtml).join("");

        elPager.hidden = totalPages<=1;
        elPagerInfo.textContent = `Trang ${page}/${totalPages}`;
        elPrev.disabled = page<=1;
        elNext.disabled = page>=totalPages;

        setParams({
          category: elCategory.value,
          grade: elGrade.value,
          q: elQ.value,
          sort: elSort.value,
          page
        });
      }

      function apply(){
        const cat = elCategory.value || "all";
        const grade = elGrade.value || "";
        const q = elQ.value || "";
        const sort = elSort.value || "new";

        VIEW = ALL.filter(p => matchCategory(p,cat) && matchGrade(p,grade) && matchSearch(p,q));
        sortList(VIEW, sort);
        render();
      }

      function bind(){
        const onChange = ()=>{ page=1; apply(); };
        elCategory.addEventListener("change", onChange);
        elGrade.addEventListener("change", onChange);
        elSort.addEventListener("change", onChange);
        elQ.addEventListener("input", debounce(()=>{ page=1; apply(); }, 220));

        elPrev.addEventListener("click", ()=>{ page=Math.max(1,page-1); render(); });
        elNext.addEventListener("click", ()=>{ page=page+1; render(); });

        // ✅ Event delegation: click card / quickview / keyboard
        elList.addEventListener("click", (e)=>{
          const quick = e.target.closest("[data-quick]");
          const card = e.target.closest(".product-card");
          if(!card) return;
          const id = card.getAttribute("data-id");

          // quickview hiện tại: giữ hành vi = đi detail (không có modal ở trang này)
          if(quick){
            e.preventDefault();
            e.stopPropagation();
            safeRedirect(id);
            return;
          }

          safeRedirect(id);
        });

        elList.addEventListener("keydown", (e)=>{
          if(e.key !== "Enter" && e.key !== " ") return;
          const card = e.target.closest(".product-card");
          if(!card) return;
          e.preventDefault();
          safeRedirect(card.getAttribute("data-id"));
        });
      }

      async function loadAll(){
        if(!db){
          elList.innerHTML = "<div class='empty'><b>Lỗi:</b> Chưa init Firebase/Firestore.</div>";
          elEmpty.hidden = true;
          elCount.textContent = "Lỗi";
          return;
        }

        const p = getParams();
        elCategory.value = p.category;
        elGrade.value = p.grade;
        elQ.value = p.q;
        elSort.value = p.sort;
        page = p.page;

        bind();

        try{
          const snap = await db.collection("products").get();
          ALL = snap.docs.map(d => ({ ...d.data(), id: String(d.id) }));
          apply();
        }catch(e){
          console.error(e);
          elList.innerHTML = "<div class='empty'><b>Không thể tải sản phẩm.</b><br/>Kiểm tra Firestore rules/kết nối.</div>";
          elCount.textContent = "Lỗi tải dữ liệu";
        }
      }

      document.addEventListener("DOMContentLoaded", loadAll);
    })();
  </script>
</body>
</html>
