<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | Gundam Store</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
  <script src="/js/firebase-init.js" defer></script>
  <script src="/js/topbar.js" defer></script>
  <script src="/js/lowerBar.js" defer></script>

  <style>
    :root {
      --brand: #f4c430;
      --brand-dark: #d4af37;
      --text: #111;
      --muted: #6b7280;
      --card: #fff;
      --line: #eee;
      --bg: #f6f7fb;
      --shadow: 0 18px 60px rgba(0, 0, 0, .12);
      --radius: 18px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
    }

    /* Layout chính giống trang đăng ký */
    #main-login {
      display: flex;
      justify-content: center;
      padding: 60px 12px 40px;
    }

    .wrap {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }

    /* Section bên trái (Hero) */
    .hero {
      background: linear-gradient(135deg, rgba(37, 99, 235, .1), rgba(0, 0, 0, .02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .hero h1 { margin: 0 0 12px; font-size: 32px; font-weight: 900; }
    .hero p { margin: 0; color: var(--muted); line-height: 1.6; font-size: 15px; }

    .hint {
      margin-top: 15px; color: var(--muted); font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }

    /* Section bên phải (Card đăng nhập) */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .title { margin: 0 0 20px; font-size: 22px; font-weight: 900; text-align: center; }

    .field { display: grid; gap: 8px; margin-bottom: 16px; }
    .label { font-weight: 700; font-size: 14px; color: #374151; }

    .input {
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px;
      font-size: 15px; outline: none; transition: all .2s;
    }

    .input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(244, 196, 48, .2);
    }

    .btn {
      width: 100%; padding: 14px; border: 0; border-radius: 12px; cursor: pointer;
      font-weight: 900; font-size: 16px; background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff; box-shadow: 0 10px 25px rgba(244, 196, 48, .3);
    }

    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .foot { margin-top: 15px; text-align: center; color: var(--muted); font-size: 14px; }
    .foot a { color: var(--text); text-decoration: none; font-weight: 900; }

    .error { margin-top: 10px; color: #ef4444; font-size: 13px; text-align: center; font-weight: 600; }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff;
      padding: 12px 20px; border-radius: 10px; display: none; z-index: 1000;
    }
  </style>
</head>

<body>
  <header id="topbar-container"></header>
  <nav id="lowerbar-container"></nav>

  <main id="main-login">
    <div class="wrap">
      <section class="hero">
        <div style="font-size: 40px; color: var(--brand); margin-bottom: 15px;">
          <i class="fa-solid fa-bolt-lightning"></i>
        </div>
        <h1>Mừng bạn trở lại!</h1>
        <p>
          Đăng nhập để tiếp tục theo dõi đơn hàng, quản lý bộ sưu tập Gundam cá nhân và nhận các ưu đãi dành riêng cho thành viên thân thiết.
        </p>
        <div class="hint">
          <i class="fa-solid fa-lock"></i>
          <span>Hệ thống bảo mật 2 lớp bởi Google Firebase Auth.</span>
        </div>
      </section>

      <section class="card">
        <h2 class="title">Đăng nhập</h2>

        <form id="loginForm">
          <div class="field">
            <label class="label" for="identity">Username hoặc Email</label>
            <input class="input" type="text" id="identity" placeholder="gundam@store.vn" required />
          </div>

          <div class="field">
            <label class="label" for="password">Mật khẩu</label>
            <input class="input" type="password" id="password" placeholder="••••••••" required />
          </div>

          <button class="btn" id="submitBtn" type="submit">Đăng nhập ngay</button>
          
          <div id="error-message" class="error"></div>

          <div class="foot">
            Chưa có tài khoản? <a href="register.html">Đăng ký thành viên</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const $ = (s) => document.querySelector(s);

    function showToast(msg) {
      const t = $("#toast");
      t.textContent = msg;
      t.style.display = "block";
      setTimeout(() => t.style.display = "none", 3000);
    }

    window.addEventListener("DOMContentLoaded", () => {
      const form = $("#loginForm");
      const btn = $("#submitBtn");
      const errorMsg = $("#error-message");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorMsg.textContent = "";

        const identity = $("#identity").value.trim();
        const password = $("#password").value;

        if (!window.firebase || !firebase.apps.length) {
          errorMsg.textContent = "Lỗi: Hệ thống chưa sẵn sàng.";
          return;
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        btn.disabled = true;
        btn.textContent = "Đang kiểm tra...";

        try {
          let email = identity;

          // Nếu nhập username (không có @), tìm email tương ứng
          if (!identity.includes("@")) {
            const snap = await db.collection("accounts").where("username", "==", identity).limit(1).get();
            if (snap.empty) {
              throw { code: "auth/user-not-found" };
            }
            email = snap.docs[0].data().email;
          }

          const cred = await auth.signInWithEmailAndPassword(email, password);
          
          // Lấy profile đầy đủ
          const userDoc = await db.collection("accounts").doc(cred.user.uid).get();
          const userData = userDoc.data() || {};

          const session = {
            userId: cred.user.uid,
            username: userData.username || email.split('@')[0],
            email: email,
            level: userData.level || 0
          };

          localStorage.setItem("loggedInUser", JSON.stringify(session));
          localStorage.setItem("loginStatus", "logged_in");

          showToast("Đăng nhập thành công!");
          setTimeout(() => window.location.href = "index.html", 1000);

        } catch (err) {
          console.error(err);
          const codes = {
            "auth/user-not-found": "Tài khoản không tồn tại.",
            "auth/wrong-password": "Mật khẩu chưa chính xác.",
            "auth/invalid-credential": "Thông tin đăng nhập sai.",
            "auth/invalid-email": "Email không đúng định dạng."
          };
          errorMsg.textContent = codes[err.code] || "Lỗi đăng nhập: " + err.code;
          btn.disabled = false;
          btn.textContent = "Đăng nhập ngay";
        }
      });
    });
  </script>
</body>

</html>
